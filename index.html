<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Cycle: Reborn - Save Editor</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* ============================================================
           CSS VARIABLES & RESET
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0b0e1a;
            --bg-secondary: #12162a;
            --bg-card: rgba(22, 28, 58, 0.8);
            --bg-glass: rgba(255, 255, 255, 0.04);
            --border-glass: rgba(255, 255, 255, 0.06);
            --text-primary: #f0f4ff;
            --text-secondary: #8896b5;
            --text-muted: #4a5578;
            --accent-cyan: #00d4ff;
            --accent-purple: #7c3aed;
            --accent-pink: #ec4899;
            --accent-orange: #f59e0b;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --shadow-glow: 0 8px 32px rgba(0, 212, 255, 0.08);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* ============================================================
           SCROLLBAR
           ============================================================ */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-cyan);
            border-radius: 4px;
            opacity: 0.5;
        }

        /* ============================================================
           TITLE BAR
           ============================================================ */
        .title-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 36px;
            background: rgba(11, 14, 26, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 9999;
            border-bottom: 1px solid var(--border-glass);
            -webkit-app-region: drag;
            user-select: none;
        }

        .title-bar .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            -webkit-app-region: no-drag;
        }

        .title-bar .brand .logo {
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: #fff;
        }

        .title-bar .brand .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-red);
            transition: var(--transition);
        }
        .title-bar .brand .status-dot.connected {
            background: var(--accent-green);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.5);
        }

        .title-controls {
            display: flex;
            gap: 4px;
            -webkit-app-region: no-drag;
        }

        .title-controls button {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .title-controls button:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
        }
        .title-controls .close:hover {
            background: var(--accent-red);
            color: #fff;
        }

        /* ============================================================
           APP LAYOUT
           ============================================================ */
        .app {
            display: flex;
            height: 100vh;
            padding-top: 36px;
            background: var(--bg-primary);
            position: relative;
        }

        /* ============================================================
           SIDEBAR
           ============================================================ */
        .sidebar {
            width: 64px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-glass);
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            overflow-y: auto;
            position: relative;
            z-index: 10;
        }

        .sidebar .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.15);
        }

        .sidebar .sep {
            width: 30px;
            height: 1px;
            background: var(--border-glass);
            margin: 4px 0;
        }

        .sidebar-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .sidebar-btn:hover {
            background: var(--bg-glass);
            color: var(--text-primary);
        }

        .sidebar-btn.active {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-cyan);
            box-shadow: inset 0 0 20px rgba(0, 212, 255, 0.05);
        }

        .sidebar-btn .badge {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 16px;
            height: 16px;
            font-size: 8px;
            font-weight: 700;
            background: var(--accent-pink);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-btn .tooltip {
            position: absolute;
            left: 56px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--bg-secondary);
            border: 1px solid var(--border-glass);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
            font-weight: 500;
        }

        .sidebar-btn:hover .tooltip {
            opacity: 1;
        }

        /* ============================================================
           MAIN CONTENT
           ============================================================ */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px 20px 12px 20px;
            overflow: hidden;
            min-width: 0;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            margin-bottom: 12px;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left h2 {
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-left .count {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-glass);
            padding: 2px 10px;
            border-radius: 12px;
            border: 1px solid var(--border-glass);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .currency-group {
            display: flex;
            gap: 4px;
            background: var(--bg-glass);
            padding: 4px 8px;
            border-radius: 20px;
            border: 1px solid var(--border-glass);
        }

        .currency-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .currency-item .icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            flex-shrink: 0;
        }

        .currency-item input {
            width: 42px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 11px;
            font-weight: 600;
            text-align: right;
            padding: 2px 0;
            outline: none;
            font-family: inherit;
            appearance: textfield;
            -moz-appearance: textfield;
        }

        .currency-item input::-webkit-inner-spin-button,
        .currency-item input::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }

        .currency-item input:focus {
            color: var(--accent-cyan);
        }

        .header-actions {
            display: flex;
            gap: 4px;
        }

        .header-btn {
            width: 30px;
            height: 30px;
            border: 1px solid var(--border-glass);
            background: var(--bg-glass);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-btn:hover {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-cyan);
            border-color: var(--accent-cyan);
        }

        .auto-save-indicator {
            font-size: 9px;
            color: var(--accent-green);
            opacity: 0;
            transition: var(--transition);
            font-weight: 500;
        }
        .auto-save-indicator.show {
            opacity: 1;
        }

        /* ============================================================
           SEARCH
           ============================================================ */
        .search-bar {
            position: relative;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 13px;
            transition: var(--transition);
            font-family: inherit;
            outline: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .search-bar input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.05);
        }

        .search-bar input::placeholder {
            color: var(--text-muted);
        }

        .search-bar .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 13px;
            pointer-events: none;
        }

        /* ============================================================
           INVENTORY GRID
           ============================================================ */
        .inventory-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 2px 0;
            margin: 0 -4px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
            padding: 4px;
        }

        .item-slot {
            aspect-ratio: 1;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px 4px;
            position: relative;
            min-height: 72px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .item-slot:hover {
            transform: translateY(-3px);
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .item-slot .item-image {
            width: 38px;
            height: 38px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 4px;
            flex-shrink: 0;
        }

        /* Rarity borders */
        .item-slot .item-image.rarity-common {
            border: 1px solid #6b7280;
        }
        .item-slot .item-image.rarity-uncommon {
            border: 1px solid #22c55e;
        }
        .item-slot .item-image.rarity-rare {
            border: 1px solid #3b82f6;
        }
        .item-slot .item-image.rarity-epic {
            border: 1px solid #a855f7;
        }
        .item-slot .item-image.rarity-exotic {
            border: 1px solid #ef4444;
        }
        .item-slot .item-image.rarity-legendary {
            border: 1px solid #f59e0b;
        }

        .item-slot .item-name {
            font-size: 7px;
            color: var(--text-secondary);
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
            margin-top: 2px;
            line-height: 1.2;
        }

        .item-slot .item-amount {
            position: absolute;
            bottom: 3px;
            right: 4px;
            background: rgba(0, 0, 0, 0.7);
            color: var(--accent-cyan);
            font-size: 8px;
            font-weight: 700;
            padding: 0 4px;
            border-radius: 3px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }

        .item-slot .rarity-glow {
            position: absolute;
            inset: -1px;
            border-radius: var(--radius-sm);
            pointer-events: none;
            opacity: 0;
            transition: var(--transition);
        }
        .item-slot:hover .rarity-glow {
            opacity: 1;
        }
        .item-slot .rarity-glow.legendary {
            box-shadow: inset 0 0 30px rgba(245, 158, 11, 0.1);
        }
        .item-slot .rarity-glow.exotic {
            box-shadow: inset 0 0 30px rgba(239, 68, 68, 0.1);
        }
        .item-slot .rarity-glow.epic {
            box-shadow: inset 0 0 30px rgba(168, 85, 247, 0.1);
        }
        .item-slot .rarity-glow.rare {
            box-shadow: inset 0 0 30px rgba(59, 130, 246, 0.1);
        }

        .empty-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: var(--text-muted);
            gap: 8px;
        }

        .empty-state .icon {
            font-size: 36px;
            opacity: 0.3;
        }
        .empty-state .text {
            font-size: 13px;
        }
        .empty-state .sub {
            font-size: 11px;
            opacity: 0.6;
        }

        .loading-spinner {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            gap: 12px;
            color: var(--text-muted);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-glass);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============================================================
           BROWSE PANEL
           ============================================================ */
        .browse-panel {
            display: none;
            margin-top: 12px;
            flex-shrink: 0;
            max-height: 35vh;
            overflow-y: auto;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 12px 14px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: slideUp 0.3s ease;
        }

        .browse-panel.open {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .browse-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .browse-header span {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .browse-header button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }
        .browse-header button:hover {
            color: var(--text-primary);
        }

        .browse-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 4px;
        }

        .browse-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: var(--transition);
            cursor: default;
        }

        .browse-item:hover {
            border-color: var(--border-glass);
            background: rgba(255, 255, 255, 0.02);
        }

        .browse-item .icon {
            width: 28px;
            height: 28px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            flex-shrink: 0;
            border-radius: 4px;
        }
        .browse-item .icon.rarity-common {
            border: 1px solid #6b7280;
        }
        .browse-item .icon.rarity-uncommon {
            border: 1px solid #22c55e;
        }
        .browse-item .icon.rarity-rare {
            border: 1px solid #3b82f6;
        }
        .browse-item .icon.rarity-epic {
            border: 1px solid #a855f7;
        }
        .browse-item .icon.rarity-exotic {
            border: 1px solid #ef4444;
        }
        .browse-item .icon.rarity-legendary {
            border: 1px solid #f59e0b;
        }

        .browse-item .info {
            flex: 1;
            min-width: 0;
        }

        .browse-item .info .name {
            font-size: 12px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .browse-item .info .meta {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .browse-item .controls {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-shrink: 0;
        }

        .browse-item .controls input {
            width: 36px;
            padding: 2px 4px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-glass);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 11px;
            text-align: center;
            font-family: inherit;
            outline: none;
        }

        .browse-item .controls input:focus {
            border-color: var(--accent-cyan);
        }

        .browse-item .controls .add-btn {
            padding: 2px 10px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: var(--transition);
            font-family: inherit;
        }

        .browse-item .controls .add-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .browse-item .rarity-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ============================================================
           MODAL
           ============================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.25s ease;
        }

        .modal-overlay.open {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 24px;
            max-width: 420px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: modalPop 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-glass);
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
        }
        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .modal-body .item-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 8px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 8px;
            border: 2px solid var(--border-glass);
        }

        .modal-body .item-title {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
        }

        .modal-body .item-sub {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .modal-body .field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 13px;
            border-bottom: 1px solid var(--border-glass);
        }

        .modal-body .field .label {
            color: var(--text-secondary);
        }
        .modal-body .field .value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .modal-body .field .value code {
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-glass);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .modal-body .durability-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 8px 0;
        }

        .modal-body .durability-group .durability-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .modal-body .durability-slider {
            width: 100%;
            accent-color: var(--accent-cyan);
            background: var(--bg-primary);
            height: 4px;
            border-radius: 2px;
            outline: none;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: flex-end;
        }

        .modal-actions button {
            padding: 6px 16px;
            border: 1px solid var(--border-glass);
            border-radius: 6px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            transition: var(--transition);
            font-family: inherit;
        }

        .modal-actions button:hover {
            background: var(--bg-glass);
            color: var(--text-primary);
        }

        .modal-actions button.danger:hover {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
            border-color: var(--accent-red);
        }

        .modal-actions button.primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: #fff;
            border: none;
        }

        .modal-actions button.primary:hover {
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.2);
        }

        /* ============================================================
           TOAST
           ============================================================ */
        .toast-container {
            position: fixed;
            top: 50px;
            right: 16px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-secondary);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            min-width: 220px;
            max-width: 340px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            animation: toastIn 0.4s ease;
            pointer-events: auto;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .toast.out {
            animation: toastOut 0.3s ease forwards;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(40px);
            }
        }

        .toast .toast-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-cyan);
        }
        .toast .toast-msg {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* ============================================================
           CONFIRM MODAL
           ============================================================ */
        .confirm-modal .modal {
            max-width: 360px;
            text-align: center;
        }

        .confirm-modal .modal .icon {
            font-size: 36px;
            margin-bottom: 4px;
        }

        .confirm-modal .modal p {
            color: var(--text-secondary);
            font-size: 13px;
            margin: 4px 0 12px;
        }

        /* ============================================================
           STATUS BAR (Bottom)
           ============================================================ */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: rgba(11, 14, 26, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 10px;
            color: var(--text-muted);
            z-index: 9998;
        }

        .status-bar .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-bar .left .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent-red);
            transition: var(--transition);
        }
        .status-bar .left .dot.connected {
            background: var(--accent-green);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
        }

        .status-bar .center {
            font-size: 9px;
            color: var(--text-muted);
            opacity: 0.5;
        }

        .status-bar .center a {
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition);
        }
        .status-bar .center a:hover {
            color: var(--accent-cyan);
        }

        .status-bar .right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            .sidebar {
                width: 48px;
                padding: 8px 4px;
            }
            .sidebar .logo-icon {
                width: 32px;
                height: 32px;
                font-size: 12px;
            }
            .sidebar-btn {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }
            .sidebar-btn .tooltip {
                display: none;
            }
            .main {

            }
            .header {

            .header-left h2 {

            }
            .currency-item input {
                width: 30px;

            }
            .inventory-grid {
                grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
                gap: 6px;
            }
            .item-slot {
                min-height: 60px;
            }
            .item-slot .item-image {
                width: 30px;

            }
            .browse-grid {
                grid-template-columns: 1fr;
            }
            .modal {
                padding: 16px;
                max-width: 100%;
                margin: 16px;
            }
            .toast {
                min-width: unset;
                max-width: 280px;
            }
        }

        @media (max-width: 480px) {
            .header-right {
                width: 100%;
                justify-content: flex-start;
            }
            .currency-group {
                flex-wrap: wrap;
            }
            .header-actions {
                margin-left: auto;

        }

        /* ============================================================
           UTILITY
           ============================================================ */

            display: none !important;

        /* ============================================================

        .update-badge {

        }

            0%,

            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>

    <!-- ============================================================
    SCRIPT
    ============================================================ -->
    <script>
        // ============================================================
        // CYCLE REBORN EDITOR
        // ============================================================
        class CycleRebornEditor {
            constructor() {
                // State
                this.inventory = [];
                this.availableItems = [];
                this.itemTemplates = {};
                this.itemConfigs = {};
                this.selectedCategory = 'all';
                this.isConnected = false;
                this.currentFilter = '';
                this.autoSaveTimeout = null;
                this.imageCache = new Map();
                this.imageErrors = new Set();
                this.browseOpen = false;
                this.currentEditingIndex = null;
// Fix for consumable ID mismatches
this.consumableFix = {
    "Combat Stim": "Consumable_Health_04",
    "Strong Stim": "Consumable_Health_05", 
    "Strong Medkit": "Consumable_Health_03",
    "Combat Medkit": "Consumable_Health_06"
};
                // API
                this.apiBaseUrl = '/api';
                // Remote asset URLs for ConstanceV1/SingePlayer-Item-editor
this.remoteAssetBase = 'https://raw.githubusercontent.com/ConstanceV1/SingePlayer-Item-editor/main';
                this.remoteConfigUrl = `${this.remoteAssetBase}/itemConfigs.json`;
                this.remoteItemsUrl = `${this.remoteAssetBase}/itemIds.json`;
                this.remoteIconsUrl = `${this.remoteAssetBase}/icons/`;

                this.init();
                this.bindEvents();
            }

            // ============================================================
            // INIT
            // ============================================================
            async init() {
                this.updateStatus('Initializing...');
                await this.loadItemConfigs();
                await this.loadAvailableItems();
                this.setupWindowControls();
                this.setupUpdateChecker();
                this.autoConnectAndLoad();
                this.updateStatus('Ready');
            }

            // ============================================================
            // WINDOW CONTROLS
            // ============================================================
            setupWindowControls() {
                if (window.electronAPI?.windowMinimize) {
                    document.getElementById('minimize-btn').addEventListener('click', () => window.electronAPI
                    .windowMinimize());
                    document.getElementById('maximize-btn').addEventListener('click', async () => {
                        await window.electronAPI.windowMaximize();
                        this.updateMaximizeBtn();
                    });
                    document.getElementById('close-btn').addEventListener('click', () => window.electronAPI.windowClose());
                    this.updateMaximizeBtn();
                } else {
                    document.querySelector('.title-bar').style.display = 'none';
                    document.querySelector('.app').style.paddingTop = '0';
                }
            }

            async updateMaximizeBtn() {
                if (window.electronAPI?.windowIsMaximized) {
                    const isMax = await window.electronAPI.windowIsMaximized();
                    document.getElementById('maximize-btn').textContent = isMax ? '❐' : '□';
                }
            }

            // ============================================================
            // UPDATE CHECKER
            // ============================================================
            setupUpdateChecker() {
                if (!window.electronAPI) return;
                const btn = document.getElementById('update-btn');
                btn.style.display = 'flex';
                btn.addEventListener('click', () => this.checkUpdates());
                if (window.electronAPI.getCurrentVersion) {
                    window.electronAPI.getCurrentVersion().then(v => {
                        // Update version in status
                    });
                }
            }

            async checkUpdates() {
                if (!window.electronAPI?.checkForUpdates) return;
                const btn = document.getElementById('update-btn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                btn.disabled = true;
                try {
                    const result = await window.electronAPI.checkForUpdates();
                    this.showToast(result.success ? '✅ Update check complete' : '❌ ' + result.message);
                } catch (e) {
                    this.showToast('❌ Update failed');
                }
                btn.innerHTML = '<i class="fas fa-rotate"></i>';
                btn.disabled = false;
            }

            // ============================================================
            // DATA LOADING
            // ============================================================
            async loadItemConfigs() {
                try {
                    const res = await fetch(this.remoteConfigUrl);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    this.itemConfigs = data.itemConfigs || {};
                    this.rarityColors = data.rarityColors || {};
                    console.log(`✅ Loaded ${Object.keys(this.itemConfigs).length} configs`);
                } catch (e) {
                    console.error('Config load error:', e);
                    this.createFallbackConfigs();
                }
            }

            async loadAvailableItems() {
                try {
                    const res = await fetch(this.remoteItemsUrl);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const items = await res.json();
                    this.availableItems = items;
                    this.itemTemplates = {};
                    for (const entry of items) {
                        if (entry.baseItemId) this.itemTemplates[entry.baseItemId] = entry;
                    }
                    console.log(
                        `✅ Loaded ${this.availableItems.length} items, ${Object.keys(this.itemTemplates).length} templates`
                        );
                } catch (e) {
                    console.error('Item load error:', e);
                    this.availableItems = [];
                    this.itemTemplates = {};
                }
            }

            createFallbackConfigs() {
                this.itemConfigs = {};
                this.rarityColors = {
                    common: '#9e9e9e',
                    uncommon: '#4caf50',
                    rare: '#2196f3',
                    epic: '#9c27b0',
                    exotic: '#ff4e4e',
                    legendary: '#ff9800'
                };
            }

            // ============================================================
            // DATABASE CONNECTION
            // ============================================================
            async autoConnectAndLoad() {
                try {
                    await this.connectToDatabase();
                    await this.loadInventory();
                    this.startStatsUpdates();
                } catch (e) {
                    console.error('Auto-connect failed:', e);
                    this.updateStatus('❌ Connection failed');
                }
            }

            async connectToDatabase() {
                this.updateStatus('Connecting to MongoDB...');
                const res = await fetch(`${this.apiBaseUrl}/connect`, { method: 'POST' });
                const data = await res.json();
                if (!res.ok || !data.success) throw new Error(data.message || 'Connection failed');
                this.isConnected = true;
                this.updateConnectionStatus(true);
                this.updateStatus('✅ Connected');
                return data;
            }

            async loadInventory() {
                this.updateStatus('Loading inventory...');
                const res = await fetch(`${this.apiBaseUrl}/inventory`);
                if (!res.ok) throw new Error('Failed to load inventory');
                const data = await res.json();
                this.inventory = Array.isArray(data) ? this.splitStacks(data) : [];
                this.renderInventory();
                this.updateStatus(`✅ ${this.inventory.length} items loaded`);
                await this.loadBalance();
            }

            async saveInventory() {
                if (!this.isConnected) return;
                try {
                    const res = await fetch(`${this.apiBaseUrl}/inventory`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.inventory)
                    });
                    if (res.ok) this.showAutoSave();
                } catch (e) {
                    console.error('Save error:', e);
                }
            }

            async loadBalance() {
                try {
                    const res = await fetch(`${this.apiBaseUrl}/balance`);
                    if (!res.ok) return;
                    const bal = await res.json();
                    document.getElementById('aurum-value').value = bal.AU || 0;
                    document.getElementById('kmarks-value').value = bal.SC || 0;
                    document.getElementById('insurance-value').value = bal.IN || 0;
                } catch (e) { /* ignore */ }
            }

            async saveBalance() {
                try {
                    const bal = {
                        AU: parseInt(document.getElementById('aurum-value').value) || 0,
                        SC: parseInt(document.getElementById('kmarks-value').value) || 0,
                        IN: parseInt(document.getElementById('insurance-value').value) || 0
                    };
                    await fetch(`${this.apiBaseUrl}/balance`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(bal)
                    });
                } catch (e) { /* ignore */ }
            }

            // ============================================================
            // RENDER
            // ============================================================
            renderInventory() {
                const grid = document.getElementById('inventory-grid');
                const filtered = this.inventory.filter(item => {
                    if (!item?.baseItemId) return false;
                    const config = this.getItemConfig(item.baseItemId);
                    const matchCat = this.selectedCategory === 'all' || config.category === this.selectedCategory;
                    const matchSearch = !this.currentFilter ||
                        item.baseItemId.toLowerCase().includes(this.currentFilter) ||
                        config.displayName.toLowerCase().includes(this.currentFilter);
                    return matchCat && matchSearch;
                });

                document.getElementById('item-count').textContent = `${filtered.length} items`;

                if (filtered.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="icon"><i class="fas fa-archive"></i></div>
                            <div class="text">No items found</div>
                            <div class="sub">Click <i class="fas fa-plus-circle"></i> Browse Items to add some</div>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = '';
                filtered.forEach((item, idx) => {
                    const config = this.getItemConfig(item.baseItemId);
                    const icon = this.getItemIcon(item.baseItemId);
                    const slot = document.createElement('div');
                    slot.className = 'item-slot';
                    slot.innerHTML = `
                        <div class="rarity-glow ${config.rarity}"></div>
                        <div class="item-image rarity-${config.rarity}" style="background-image:url('${icon}')"></div>
                        <div class="item-name">${config.displayName}</div>
                        <div class="item-amount">${item.amount || 1}</div>
                    `;
                    const img = slot.querySelector('.item-image');
                    this.handleImageLoad(img, icon, item.baseItemId);
                    slot.addEventListener('click', () => this.showItemDetail(item, this.inventory.indexOf(item)));
                    grid.appendChild(slot);
                });
            }

            renderBrowseItems() {
                const grid = document.getElementById('browse-grid');
                grid.innerHTML = '';

                const unique = [];
                const seen = new Set();
                for (const item of this.availableItems) {

                    if (item.baseItemId === "ShieldRestoration04") continue;
                    
                    if (!seen.has(item.baseItemId) && this.itemConfigs[item.baseItemId]) {
                        unique.push(item);
                        seen.add(item.baseItemId);
                    }
                }

                const filtered = unique.filter(item => {
                    const config = this.getItemConfig(item.baseItemId);
                    const matchCat = this.selectedCategory === 'all' || config.category === this.selectedCategory;
                    const matchSearch = !this.currentFilter ||
                        config.displayName.toLowerCase().includes(this.currentFilter) ||
                        item.baseItemId.toLowerCase().includes(this.currentFilter);
                    return matchCat && matchSearch;
                });

                if (filtered.length === 0) {
                    grid.innerHTML =
                        '<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:20px;">No items match</div>';
                    return;
                }

                filtered.forEach(item => {
                    const config = this.getItemConfig(item.baseItemId);
                    const icon = this.getItemIcon(item.baseItemId);
                    const div = document.createElement('div');
                    div.className = 'browse-item';
                    div.innerHTML = `
                        <span class="rarity-dot" style="background:${this.rarityColors[config.rarity] || '#666'}"></span>
                        <div class="icon rarity-${config.rarity}" style="background-image:url('${icon}')"></div>
                        <div class="info">
                            <div class="name">${config.displayName}</div>
                            <div class="meta">${config.category} · ${config.rarity}</div>
                        </div>
                        <div class="controls">
                            <input type="number" value="1" min="1" max="999" id="qty-${item.baseItemId}">
                            <button class="add-btn" data-id="${item.baseItemId}"><i class="fas fa-plus"></i></button>
                        </div>
                    `;
                    const img = div.querySelector('.icon');
                    this.handleImageLoad(img, icon, item.baseItemId);

                    const btn = div.querySelector('.add-btn');
                    const input = div.querySelector('input');
                    btn.addEventListener('click', () => {
                        const qty = parseInt(input.value) || 1;
                        this.addItemToInventory(item.baseItemId, qty);
                    });

                    grid.appendChild(div);
                });
            }

            // ============================================================
            // ITEM OPERATIONS
            // ============================================================
            addItemToInventory(baseItemId, quantity) {
                const amount = parseInt(quantity) || 1;
                const config = this.getItemConfig(baseItemId);
                const isWeapon = baseItemId.startsWith('WP_') || config.category === 'weapons';
// Add this at the start of addItemToInventory()
if (this.consumableFix[config.displayName]) {
    baseItemId = this.consumableFix[config.displayName];
}
                if (isWeapon) {
                    for (let i = 0; i < amount; i++) {
                        this.inventory.push({
                            itemId: this.generateUUID(),
                            baseItemId: baseItemId,
                            primaryVanityId: 0,
                            secondaryVanityId: 0,
                            amount: 1,
                            durability: config.maxDurability !== undefined ? config.maxDurability : -1,
                            modData: { m: [] },
                            rolledPerks: [],
                            insurance: "",
                            insuranceOwnerPlayfabId: "",
                            insuredAttachmentId: "",
                            origin: { t: "", p: "", g: "" }
                        });
                    }
                    this.renderInventory();
                    this.autoSave();
                    this.showToast(`✅ Added ${amount}x ${config.displayName}`);
                    return;
                }

                let maxStack = config.maxStackSize || 50;
                const effectiveMaxStack = maxStack > 0 ? maxStack : 1;
                let remaining = amount;

                const existing = this.inventory.filter(i =>
                    i.baseItemId === baseItemId && i.amount < effectiveMaxStack
                );

                for (const item of existing) {
                    if (remaining <= 0) break;
                    const canAdd = effectiveMaxStack - item.amount;
                    const toAdd = Math.min(remaining, canAdd);
                    item.amount += toAdd;
                    remaining -= toAdd;
                }

                while (remaining > 0) {
                    const stackAmount = Math.max(1, Math.min(remaining, effectiveMaxStack));
                    this.inventory.push({
                        itemId: this.generateUUID(),
                        baseItemId: baseItemId,
                        primaryVanityId: 0,
                        secondaryVanityId: 0,
                        amount: stackAmount,
                        durability: config.maxDurability !== undefined ? config.maxDurability : -1,
                        modData: { m: [] },
                        rolledPerks: [],
                        insurance: "",
                        insuranceOwnerPlayfabId: "",
                        insuredAttachmentId: "",
                        origin: { t: "", p: "", g: "" }
                    });
                    remaining -= stackAmount;
                }

                this.renderInventory();
                this.autoSave();
                this.showToast(`✅ Added ${amount}x ${config.displayName}`);
            }

            removeItem(index) {
                const item = this.inventory[index];
                if (!item) return;
                const config = this.getItemConfig(item.baseItemId);
                this.showConfirm(`Remove ${item.amount || 1}x ${config.displayName}?`, () => {
                    this.inventory.splice(index, 1);
                    this.renderInventory();
                    this.autoSave();
                    this.showToast(`🗑️ Removed ${config.displayName}`);
                });
            }

            clearInventory() {
                if (this.inventory.length === 0) return;
                this.showConfirm('Clear entire inventory?', () => {
                    this.inventory = [];
                    this.renderInventory();
                    this.autoSave();
                    this.showToast('🗑️ Inventory cleared');
                });
            }

            splitStacks(inventory) {
                const result = [];
                for (const item of inventory) {
                    const config = this.getItemConfig(item.baseItemId);
                    const maxStack = config.maxStackSize || 50;
                    if (item.amount <= maxStack) {
                        result.push(item);
                    } else {
                        let remaining = item.amount;
                        while (remaining > 0) {
                            const amt = Math.min(remaining, maxStack);
                            result.push({ ...item, itemId: this.generateUUID(), amount: amt });
                            remaining -= amt;
                        }
                    }
                }
                return result;
            }

            // ============================================================
            // MODALS
            // ============================================================
            showItemDetail(item, index) {
                this.currentEditingIndex = index;
                const config = this.getItemConfig(item.baseItemId);
                const icon = this.getItemIcon(item.baseItemId);
                const isWeapon = config.category === 'weapons' || config.category === 'attachments';
                const showDurability = config.maxDurability > 0 && !isWeapon;

                const body = document.getElementById('modal-body');
                body.innerHTML = `
                    <div class="item-icon" style="background-image:url('${icon}');border-color:${this.rarityColors[config.rarity] || '#666'}"></div>
                    <div class="item-title" style="color:${this.rarityColors[config.rarity] || '#fff'}">${config.displayName}</div>
                    <div class="item-sub">${config.rarity.toUpperCase()} · ${config.category}</div>

                    <div class="field">
                        <span class="label">ID</span>
                        <span class="value"><code>${item.baseItemId}</code></span>
                    </div>
                    <div class="field">
                        <span class="label">Amount</span>
                        <div style="display:flex;gap:6px;align-items:center;">
                            <input type="number" id="edit-qty" value="${item.amount || 1}" min="0" max="999" style="width:50px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:4px;color:var(--text-primary);padding:2px 6px;text-align:center;font-family:inherit;outline:none;">
                            <button class="primary" style="padding:2px 10px;background:linear-gradient(135deg,var(--accent-cyan),var(--accent-purple));color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;" id="update-qty-btn">Update</button>
                        </div>
                    </div>
                    ${showDurability ? `
                        <div class="durability-group">
                            <div class="durability-label">
                                <span>Durability</span>
                                <span id="durability-display">${item.durability === -1 ? config.maxDurability : item.durability} / ${config.maxDurability}</span>
                            </div>
                            <input type="range" class="durability-slider" id="durability-slider" min="0" max="${config.maxDurability}" value="${item.durability === -1 ? config.maxDurability : item.durability}">
                        </div>
                    ` : ''}
                    <div class="modal-actions">
                        <button class="danger" id="remove-btn"><i class="fas fa-trash"></i> Remove</button>
                        <button id="modal-close-btn"><i class="fas fa-times"></i> Close</button>
                    </div>
                `;

                // Amount update
                document.getElementById('update-qty-btn')?.addEventListener('click', () => {
                    const qty = parseInt(document.getElementById('edit-qty').value) || 0;
                    if (qty <= 0) {
                        this.removeItem(index);
                        this.closeModal();
                        return;
                    }
                    this.inventory[index].amount = qty;
                    this.renderInventory();
                    this.autoSave();
                    this.showToast(`✅ Updated to ${qty}`);
                    this.closeModal();
                });

                // Durability
                const slider = document.getElementById('durability-slider');
                if (slider) {
                    slider.addEventListener('input', () => {
                        const val = parseInt(slider.value);
                        document.getElementById('durability-display').textContent = `${val} / ${config.maxDurability}`;
                        this.inventory[index].durability = val;
                        this.autoSave();
                    });
                }

                // Remove
                document.getElementById('remove-btn')?.addEventListener('click', () => {
                    this.removeItem(index);
                    this.closeModal();
                });

                // Close
                document.getElementById('modal-close-btn')?.addEventListener('click', () => this.closeModal());

                document.getElementById('modal-title').textContent = 'Item Details';
                document.getElementById('modal-overlay').classList.add('open');
            }

            closeModal() {
                document.getElementById('modal-overlay').classList.remove('open');
                this.currentEditingIndex = null;
            }

            // ============================================================
            // CONFIRM MODAL
            // ============================================================
            showConfirm(message, onConfirm) {
                document.getElementById('confirm-message').textContent = message;
                document.getElementById('confirm-overlay').classList.add('open');

                const yes = document.getElementById('confirm-yes');
                const no = document.getElementById('confirm-no');
                const close = document.getElementById('confirm-close');

                const cleanup = () => {
                    document.getElementById('confirm-overlay').classList.remove('open');
                    yes.removeEventListener('click', onYes);
                    no.removeEventListener('click', onNo);
                    close.removeEventListener('click', onNo);
                };

                const onYes = () => { cleanup();
                    onConfirm(); };
                const onNo = () => { cleanup(); };

                yes.addEventListener('click', onYes);
                no.addEventListener('click', onNo);
                close.addEventListener('click', onNo);
            }

            // ============================================================
            // UTILITY
            // ============================================================
            getItemConfig(baseItemId) {
                if (this.itemConfigs[baseItemId]) return this.itemConfigs[baseItemId];
                return {
                    displayName: this.cleanDisplayName(baseItemId),
                    category: this.guessCategory(baseItemId),
                    rarity: 'common',
                    maxDurability: this.guessMaxDurability(baseItemId),
                    maxStackSize: this.guessMaxStackSize(baseItemId),
                    icon: this.getDefaultIcon(baseItemId)
                };
            }

            guessCategory(id) {
                const i = id.toLowerCase();
                if (i.includes('wp_')) return 'weapons';
                if (i.includes('consumable')) return 'consumables';
                if (i.includes('shield') || i.includes('helmet') || i.includes('bag') || i.includes('vest')) return 'armor';
                if (i.includes('light') || i.includes('medium') || i.includes('heavy') || i.includes('shotgun') || i
                    .includes('special')) return 'ammo';
                if (i.includes('tool') || i.includes('scanner')) return 'tools';
                if (i.includes('mod_')) return 'attachments';
                return 'materials';
            }

            guessMaxDurability(id) {
                const i = id.toLowerCase();
                if (i.includes('wp_')) return 1000;
                if (i.includes('helmet')) return 600;
                if (i.includes('shield')) return 500;
                if (i.includes('vest')) return 400;
                if (i.includes('tool')) return 500;
                return -1;
            }

            guessMaxStackSize(id) {
                const i = id.toLowerCase();
                if (i.includes('oldcurrency') || i.includes('old_currency')) return 999999;
                if (i.includes('consumable') || i.includes('grenade')) return 5;
                if (i.includes('light') || i.includes('medium') || i.includes('heavy') || i.includes('shotgun') || i
                    .includes('special')) return 250;
                if (i.includes('veltecite') || i.includes('nickel') || i.includes('materials')) return 100;
                if (i.includes('wp_') || i.includes('helmet') || i.includes('shield') || i.includes('bag') || i.includes(
                    'vest')) return 1;
                return 20;
            }

            cleanDisplayName(name) {
                return name
                    .replace(/^(WP_[A-Z]_|TOOL_|Mod_|Consumable_)/g, '')
                    .replace(/_+/g, ' ')
                    .replace(/\b\w+/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
                    .trim();
            }

            getItemIcon(baseItemId) {
                const config = this.getItemConfig(baseItemId);
                if (config.icon && config.icon !== this.getDefaultIcon(baseItemId)) {
                    return `${this.remoteIconsUrl}${config.icon}`;
                }
                return this.createPlaceholderIcon(baseItemId);
            }

            getDefaultIcon() { return 'default.png'; }

            createPlaceholderIcon(baseItemId) {
                return `data:image/svg+xml;base64,${btoa(`
                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60">
                        <rect width="60" height="60" fill="#1a202c"/>
                        <text x="30" y="32" text-anchor="middle" fill="#475569" font-family="monospace" font-size="8">${baseItemId.substring(0, 8)}</text>
                    </svg>
                `)}`;
            }

            generateUUID() {
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                    const r = Math.random() * 16 | 0;
                    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
                });
            }

            handleImageLoad(element, imagePath, itemId) {
                if (this.imageErrors.has(imagePath)) {
                    element.classList.add('error');
                    element.style.backgroundImage = 'none';
                    return;
                }
                if (this.imageCache.has(imagePath)) return;
                const img = new Image();
                img.onload = () => this.imageCache.set(imagePath, true);
                img.onerror = () => {
                    this.imageErrors.add(imagePath);
                    element.classList.add('error');
                    element.style.backgroundImage = 'none';
                };
                img.src = imagePath;
            }

            // ============================================================
            // UI HELPERS
            // ============================================================
            updateStatus(msg) {
                const el = document.getElementById('status-text');
                if (el) el.textContent = msg;
                console.log('📊', msg);
            }

            updateConnectionStatus(connected) {
                const dot = document.getElementById('status-dot');
                if (dot) dot.className = `dot ${connected ? 'connected' : ''}`;
                const titleDot = document.getElementById('title-dot');
                if (titleDot) titleDot.className = `status-dot ${connected ? 'connected' : ''}`;
                const text = document.getElementById('connection-text');
                if (text) text.textContent = connected ? 'Connected' : 'Disconnected';
            }

            showToast(msg, title = '') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `
                    <div class="toast-title">${title || '✓'}</div>
                    <div class="toast-msg">${msg}</div>
                `;
                container.appendChild(toast);
                setTimeout(() => {
                    toast.classList.add('out');
                    setTimeout(() => toast.remove(), 400);
                }, 3000);
            }

            showAutoSave() {
                const el = document.getElementById('auto-save-indicator');
                el.classList.add('show');
                clearTimeout(this.saveTimeout);
                this.saveTimeout = setTimeout(() => el.classList.remove('show'), 1500);
            }

            autoSave() {
                clearTimeout(this.autoSaveTimeout);
                this.autoSaveTimeout = setTimeout(() => this.saveInventory(), 500);
            }

            // ============================================================
            // STATS
            // ============================================================
            async pingUserStats() {
                try {
                    await fetch(`${this.apiBaseUrl}/user/ping`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ version: '2.0.0' })
                    });
                } catch (e) { /* ignore */ }
            }

            startStatsUpdates() {
                this.pingUserStats();
                setInterval(() => this.pingUserStats(), 300000);
            }

            // ============================================================
            // EVENTS
            // ============================================================
            bindEvents() {
                // Category buttons
                document.querySelectorAll('.sidebar-btn[data-category]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.sidebar-btn[data-category]').forEach(b => b.classList.remove(
                        'active'));
                        btn.classList.add('active');
                        this.selectedCategory = btn.dataset.category;
                        this.renderInventory();
                        if (this.browseOpen) this.renderBrowseItems();
                    });
                });

                // Browse
                document.getElementById('browse-btn').addEventListener('click', () => {
                    this.browseOpen = !this.browseOpen;
                    document.getElementById('browse-panel').classList.toggle('open', this.browseOpen);
                    if (this.browseOpen) this.renderBrowseItems();
                });
                document.getElementById('close-browse').addEventListener('click', () => {
                    this.browseOpen = false;
                    document.getElementById('browse-panel').classList.remove('open');
                });

                // Search
                document.getElementById('search-input').addEventListener('input', (e) => {
                    this.currentFilter = e.target.value.toLowerCase();
                    this.renderInventory();
                    if (this.browseOpen) this.renderBrowseItems();
                });

                // Actions
                document.getElementById('clear-btn').addEventListener('click', () => this.clearInventory());
                document.getElementById('backup-btn').addEventListener('click', () => this.exportBackup());
                document.getElementById('restore-btn').addEventListener('click', () => this.importBackup());
                document.getElementById('reload-btn').addEventListener('click', () => this.reloadAll());
                document.getElementById('reload-header-btn').addEventListener('click', () => this.reloadAll());
                document.getElementById('launch-btn').addEventListener('click', () => this.launchGame());
                document.getElementById('configure-btn').addEventListener('click', () => this.configureGame());

                // Currency
                ['aurum-value', 'kmarks-value', 'insurance-value'].forEach(id => {
                    document.getElementById(id).addEventListener('change', () => this.saveBalance());
                });

                // Modal close
                document.getElementById('modal-close').addEventListener('click', () => this.closeModal());
                document.getElementById('modal-overlay').addEventListener('click', (e) => {
                    if (e.target === e.currentTarget) this.closeModal();
                });

                // Confirm close
                document.getElementById('confirm-overlay').addEventListener('click', (e) => {
                    if (e.target === e.currentTarget) document.getElementById('confirm-overlay').classList.remove(
                    'open');
                });

                // Keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        this.closeModal();
                        document.getElementById('confirm-overlay').classList.remove('open');
                    }
                    if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                        e.preventDefault();
                        document.getElementById('search-input').focus();
                    }
                });

                // Game config check
                this.checkGameConfig();
            }

            // ============================================================
            // GAME LAUNCHER
            // ============================================================
            async launchGame() {
                if (!window.electronAPI?.launchGame) {
                    this.showToast('❌ Game launcher only available in desktop app');
                    return;
                }
                const btn = document.getElementById('launch-btn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                btn.disabled = true;
                try {
                    const result = await window.electronAPI.launchGame();
                    this.showToast(result.success ? '✅ Game launched!' : '❌ ' + result.message);
                } catch (e) {
                    this.showToast('❌ Launch failed');
                }
                btn.innerHTML = '<i class="fas fa-play"></i>';
                btn.disabled = false;
            }

            async configureGame() {
                if (!window.electronAPI?.configureGamePaths) return;
                await window.electronAPI.configureGamePaths();
                this.checkGameConfig();
            }

            async checkGameConfig() {
                if (!window.electronAPI?.checkGameConfigured) return;
                const configured = await window.electronAPI.checkGameConfigured();
                document.getElementById('configure-btn').style.display = configured ? 'none' : 'flex';
            }

            // ============================================================
            // BACKUP
            // ============================================================
            exportBackup() {
                const data = { timestamp: new Date().toISOString(), inventory: this.inventory };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `cycle_backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                this.showToast('💾 Backup exported');
            }

            importBackup() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        try {
                            const data = JSON.parse(ev.target.result);
                            if (data.inventory && Array.isArray(data.inventory)) {
                                this.inventory = data.inventory;
                                this.renderInventory();
                                this.autoSave();
                                this.showToast('📂 Backup imported');
                            }
                        } catch (err) {
                            this.showToast('❌ Invalid backup file');
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }

            // ============================================================
            // RELOAD
            // ============================================================
            async reloadAll() {
                this.showToast('🔄 Reloading...');
                await this.loadItemConfigs();
                await this.loadAvailableItems();
                await this.loadInventory();
                this.renderInventory();
                if (this.browseOpen) this.renderBrowseItems();
                this.showToast('✅ Reloaded');
            }
        }

        // ============================================================
        // INIT
        // ============================================================
        const editor = new CycleRebornEditor();

        console.log(`
        ╔═══════════════════════════════════════════╗

        ╚═══════════════════════════════════════════╝
        `);
    </script>
